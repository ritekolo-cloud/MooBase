services:
  # ─────────────────────────────────────────────
  # 1. Backend — Express Web Service (Node)
  # ─────────────────────────────────────────────
  - type: web
    name: moobase-server
    runtime: node
    plan: free
    rootDir: backend
    # Install deps (including devDeps for tsc & prisma CLI),
    # push the schema to the managed DB, then compile TypeScript.
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database ──────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: moobase-db
          property: connectionString

      # ── JWT ───────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"

      # ── CORS / Client origin ──────────────────
      - key: CLIENT_URL
        value: https://moobase-client.onrender.com

      # ── SMTP (set SMTP_USER & SMTP_PASS manually in Render dashboard) ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false          # set manually in Render dashboard
      - key: SMTP_PASS
        sync: false          # use a Gmail App Password, not your account password
      - key: EMAIL_FROM
        value: "MooBase <yourgmail@gmail.com>"

  # ─────────────────────────────────────────────
  # 2. Frontend — Vite / React Static Site
  # ─────────────────────────────────────────────
  - type: web
    name: moobase-client
    runtime: static
    rootDir: MooBase-Client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://moobase-server.onrender.com/api
    routes:
      # SPA fallback — all paths render index.html so React Router works
      - type: rewrite
        source: /*
        destination: /index.html

# ─────────────────────────────────────────────
# 3. PostgreSQL Database
# ─────────────────────────────────────────────
databases:
  - name: moobase-db
    plan: free
